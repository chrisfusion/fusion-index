<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <!-- Deep space gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0e1a"/>
      <stop offset="50%"  stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>

    <!-- Plasma glow for fusion core -->
    <radialGradient id="plasmaCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="25%"  stop-color="#7efff5" stop-opacity="0.85"/>
      <stop offset="60%"  stop-color="#00c8ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0057ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer plasma halo -->
    <radialGradient id="plasmaHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00c8ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0057ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Index accent gradient -->
    <linearGradient id="indexGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7efff5"/>
      <stop offset="100%" stop-color="#0099dd"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7efff5"/>
      <stop offset="40%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#00c8ff"/>
    </linearGradient>

    <!-- Glow filter for plasma rings -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow for core -->
    <filter id="coreGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="10"/>

  <!-- Subtle grid lines -->
  <g stroke="#1a2a40" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="50"  x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
  </g>

  <!-- ══ FUSION REACTOR ICON (left side) ══ -->
  <!-- Outer halo -->
  <ellipse cx="100" cy="100" rx="72" ry="72" fill="url(#plasmaHalo)" filter="url(#coreGlow)"/>

  <!-- Tokamak containment rings — outer -->
  <ellipse cx="100" cy="100" rx="66" ry="28" fill="none" stroke="#0099dd" stroke-width="1.5" opacity="0.5" filter="url(#glow)" transform="rotate(-20,100,100)"/>
  <ellipse cx="100" cy="100" rx="66" ry="28" fill="none" stroke="#0099dd" stroke-width="1.5" opacity="0.5" filter="url(#glow)" transform="rotate(40,100,100)"/>
  <ellipse cx="100" cy="100" rx="66" ry="28" fill="none" stroke="#0099dd" stroke-width="1.5" opacity="0.5" filter="url(#glow)" transform="rotate(100,100,100)"/>

  <!-- Tokamak containment rings — inner plasma -->
  <ellipse cx="100" cy="100" rx="45" ry="18" fill="none" stroke="#7efff5" stroke-width="2" opacity="0.8" filter="url(#glow)" transform="rotate(-20,100,100)"/>
  <ellipse cx="100" cy="100" rx="45" ry="18" fill="none" stroke="#7efff5" stroke-width="2" opacity="0.8" filter="url(#glow)" transform="rotate(40,100,100)"/>
  <ellipse cx="100" cy="100" rx="45" ry="18" fill="none" stroke="#7efff5" stroke-width="2" opacity="0.8" filter="url(#glow)" transform="rotate(100,100,100)"/>

  <!-- Plasma core -->
  <circle cx="100" cy="100" r="18" fill="url(#plasmaCore)" filter="url(#coreGlow)"/>
  <circle cx="100" cy="100" r="9"  fill="#ffffff" opacity="0.95" filter="url(#coreGlow)"/>

  <!-- Magnetic field node dots -->
  <circle cx="100" cy="34"  r="3.5" fill="#7efff5" opacity="0.9" filter="url(#glow)"/>
  <circle cx="100" cy="166" r="3.5" fill="#7efff5" opacity="0.9" filter="url(#glow)"/>
  <circle cx="34"  cy="100" r="3.5" fill="#00c8ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="166" cy="100" r="3.5" fill="#00c8ff" opacity="0.9" filter="url(#glow)"/>

  <!-- ══ INDEX SYMBOL (catalog rows) ══ -->
  <g transform="translate(186,62)" filter="url(#glow)">
    <!-- Index rows — evenly spaced, tapered width to suggest depth -->
    <rect x="0" y="0"  width="30" height="5" rx="2" fill="url(#indexGrad)" opacity="0.95"/>
    <rect x="0" y="10" width="22" height="5" rx="2" fill="url(#indexGrad)" opacity="0.75"/>
    <rect x="0" y="20" width="26" height="5" rx="2" fill="url(#indexGrad)" opacity="0.85"/>
    <rect x="0" y="30" width="18" height="5" rx="2" fill="url(#indexGrad)" opacity="0.65"/>
    <rect x="0" y="40" width="24" height="5" rx="2" fill="url(#indexGrad)" opacity="0.80"/>
    <rect x="0" y="50" width="20" height="5" rx="2" fill="url(#indexGrad)" opacity="0.70"/>
    <rect x="0" y="60" width="28" height="5" rx="2" fill="url(#indexGrad)" opacity="0.90"/>
    <!-- vertical cursor line -->
    <line x1="-6" y1="0" x2="-6" y2="65" stroke="#7efff5" stroke-width="2" opacity="0.9"/>
  </g>

  <!-- ══ TITLE ══ -->
  <text x="270" y="96"
        font-family="'Courier New', Courier, monospace"
        font-size="52" font-weight="700" letter-spacing="2"
        fill="url(#titleGrad)" filter="url(#textGlow)">fusion-index</text>

  <!-- ══ TAGLINE ══ -->
  <text x="271" y="128"
        font-family="'Courier New', Courier, monospace"
        font-size="16" letter-spacing="3" fill="#4ab8cc" opacity="0.85">
    JOB REGISTRY  ·  ARTIFACT STORE  ·  REST API
  </text>

  <!-- ══ TECH PILLS ══ -->
  <g font-family="'Courier New', Courier, monospace" font-size="11" letter-spacing="1">
    <!-- Go -->
    <rect x="270" y="148" width="42" height="20" rx="4" fill="#00aed6" opacity="0.18"/>
    <rect x="270" y="148" width="42" height="20" rx="4" fill="none" stroke="#00aed6" stroke-width="0.8" opacity="0.5"/>
    <text x="291" y="162" fill="#7efff5" text-anchor="middle">Go 1.25</text>

    <!-- Gin -->
    <rect x="320" y="148" width="32" height="20" rx="4" fill="#00aed6" opacity="0.18"/>
    <rect x="320" y="148" width="32" height="20" rx="4" fill="none" stroke="#00aed6" stroke-width="0.8" opacity="0.5"/>
    <text x="336" y="162" fill="#7efff5" text-anchor="middle">Gin</text>

    <!-- PostgreSQL -->
    <rect x="360" y="148" width="80" height="20" rx="4" fill="#00aed6" opacity="0.18"/>
    <rect x="360" y="148" width="80" height="20" rx="4" fill="none" stroke="#00aed6" stroke-width="0.8" opacity="0.5"/>
    <text x="400" y="162" fill="#7efff5" text-anchor="middle">PostgreSQL</text>

    <!-- sqlc -->
    <rect x="448" y="148" width="38" height="20" rx="4" fill="#00aed6" opacity="0.18"/>
    <rect x="448" y="148" width="38" height="20" rx="4" fill="none" stroke="#00aed6" stroke-width="0.8" opacity="0.5"/>
    <text x="467" y="162" fill="#7efff5" text-anchor="middle">sqlc</text>

    <!-- S3 -->
    <rect x="494" y="148" width="28" height="20" rx="4" fill="#00aed6" opacity="0.18"/>
    <rect x="494" y="148" width="28" height="20" rx="4" fill="none" stroke="#00aed6" stroke-width="0.8" opacity="0.5"/>
    <text x="508" y="162" fill="#7efff5" text-anchor="middle">S3</text>

    <!-- Helm -->
    <rect x="530" y="148" width="40" height="20" rx="4" fill="#00aed6" opacity="0.18"/>
    <rect x="530" y="148" width="40" height="20" rx="4" fill="none" stroke="#00aed6" stroke-width="0.8" opacity="0.5"/>
    <text x="550" y="162" fill="#7efff5" text-anchor="middle">Helm</text>
  </g>

  <!-- ══ VERSION BADGE ══ -->
  <rect x="800" y="148" width="78" height="22" rx="5" fill="#0057ff" opacity="0.25"/>
  <rect x="800" y="148" width="78" height="22" rx="5" fill="none" stroke="#0099dd" stroke-width="0.8" opacity="0.6"/>
  <text x="839" y="163"
        font-family="'Courier New', Courier, monospace"
        font-size="11" letter-spacing="1" fill="#7efff5" text-anchor="middle">v0.1.0</text>

  <!-- Decorative side accent lines -->
  <line x1="880" y1="20" x2="880" y2="180" stroke="#0099dd" stroke-width="1" opacity="0.3"/>
  <line x1="885" y1="40" x2="885" y2="160" stroke="#00c8ff" stroke-width="0.5" opacity="0.2"/>
</svg>
