# =============================================================================
# fusion-index — Helm Values (production defaults)
# =============================================================================

# Set to false if the namespace already exists (e.g. fusion-spectra installed it first)
createNamespace: true

# -----------------------------------------------------------------------------
# Backend — Quarkus REST service (port 8080)
# -----------------------------------------------------------------------------
backend:
  image:
    repository: fusion-index
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  # Internal Kubernetes Service name for the backend
  serviceName: fusion-index-backend

  replicas: 1

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # storageBackend: S3 | FILESYSTEM — defaults to S3 in production
  storageBackend: S3

  # ginMode: release | debug | test — maps to GIN_MODE env var
  ginMode: release

  # logLevel: debug | info | warn | error — maps to LOG_LEVEL
  logLevel: "info"
  # logFormat: json | text — maps to LOG_FORMAT (json for k8s log collectors, text for local dev)
  logFormat: "json"

  # dbSSLMode: disable | require | verify-full — maps to DB_SSLMODE
  # Use "require" or "verify-full" when PostgreSQL has TLS enabled (production).
  dbSSLMode: disable

  # Extra labels added to the Deployment object metadata (not pods).
  # Useful for GitOps tooling, cost allocation, or policy selectors.
  # Example:
  #   deploymentLabels:
  #     team: platform
  #     managed-by: argocd
  deploymentLabels: {}

  # Extra annotations added to the Deployment object metadata (not pods).
  # Useful for ArgoCD sync-wave, Flux, or other controllers that read Deployment annotations.
  # Example:
  #   deploymentAnnotations:
  #     argocd.argoproj.io/sync-wave: "2"
  #     link.argocd.argoproj.io/external-link: "http://index.fusion.local"
  deploymentAnnotations: {}

  # Extra annotations added to the Service object.
  # Example:
  #   serviceAnnotations:
  #     service.beta.kubernetes.io/aws-load-balancer-type: nlb
  serviceAnnotations: {}

  # Extra annotations added to every pod created by this Deployment.
  # Example:
  #   podAnnotations:
  #     prometheus.io/scrape: "true"
  #     prometheus.io/port: "8080"
  podAnnotations: {}

  # Extra labels added to every pod created by this Deployment.
  # Example:
  #   podLabels:
  #     team: platform
  #     tier: backend
  podLabels: {}

  # Pod-level security context (spec.securityContext).
  # Applied to all containers in the pod.
  # Example:
  #   podSecurityContext:
  #     runAsNonRoot: true
  #     runAsUser: 1000
  #     fsGroup: 2000
  podSecurityContext: {}

  # Container-level security context (spec.containers[].securityContext).
  # Example:
  #   containerSecurityContext:
  #     allowPrivilegeEscalation: false
  #     readOnlyRootFilesystem: true
  #     capabilities:
  #       drop: [ALL]
  containerSecurityContext: {}

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

  # Persistent storage for FILESYSTEM backend.
  # Disabled by default — production uses S3.
  # Enable when storageBackend=FILESYSTEM to survive pod restarts.
  persistence:
    enabled: false
    size: 10Gi
    storageClass: ""          # empty = cluster default StorageClass
    accessMode: ReadWriteOnce
    mountPath: /data/artifacts

# -----------------------------------------------------------------------------
# Admin — maintenance endpoint configuration
# -----------------------------------------------------------------------------
admin:
  # Tag name that protects an artifact (and all its versions) from bulk admin deletes.
  # Any artifact carrying this tag is skipped by DELETE /api/v1/admin/** operations.
  # Maps to the ADMIN_PROTECTED_TAG env var.
  protectedTag: "protect"

# -----------------------------------------------------------------------------
# Authentication — Kubernetes service account token validation
#
# When enabled the backend calls the cluster TokenReview API to validate every
# request to /api/v1/**. Health probes and OpenAPI endpoints are always public.
#
# Requires the pod to have RBAC permission to create tokenreviews
# (provisioned automatically when auth.enabled: true).
# -----------------------------------------------------------------------------
auth:
  enabled: false

  # If non-empty, the token must have been issued for this audience.
  # Recommended: set to the service name (e.g. "fusion-index").
  audience: ""

  # Whitelist of service accounts allowed to call the API.
  # Format: "namespace/name". Empty list = any valid SA token is accepted.
  # Example:
  #   allowedServiceAccounts:
  #     - fusion/fusion-spectra
  #     - fusion/ci-runner
  allowedServiceAccounts: []

# -----------------------------------------------------------------------------
# PostgreSQL — connection to a pre-installed instance
#
# fusion-index does not install or manage PostgreSQL itself. Point it at an
# existing instance (in-cluster, RDS, Cloud SQL, etc.) via the fields below.
# -----------------------------------------------------------------------------
postgresql:
  host: ""
  port: 5432
  database: fusion_index
  username: fusion
  existingSecret: ""     # if set, password below is ignored; secret must have key 'password'
  password: "changeme"   # override in production — or use existingSecret

  # Admin/superuser credentials used only by createDatabaseJob below to run
  # CREATE DATABASE before the app's own database exists. Kept separate from
  # postgresql.username/password above, which are the app's runtime credentials
  # and typically do not have CREATEDB privilege. Connects to the same
  # postgresql.host/port as the app.
  admin:
    username: postgres
    existingSecret: ""          # if set, password below is ignored; secret must have key matching existingSecretKey
    existingSecretKey: "password"
    password: ""                # fallback when existingSecret is empty

  # Runs as a Helm pre-install,pre-upgrade hook Job that creates
  # postgresql.database (CREATE DATABASE IF NOT EXISTS-equivalent, idempotent)
  # before the main Deployment is applied. It does NOT create tables — schema
  # migrations are applied by the fusion-index binary itself on startup.
  createDatabaseJob:
    enabled: true
    image: postgres:16-alpine
    activeDeadlineSeconds: 120
    # postgres:16-alpine runs as UID 70 (user "postgres"). Only the psql client
    # is used here (non-interactive -c mode), so readOnlyRootFilesystem is safe
    # with no extra volumes.
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 70
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]

  # Daily metadata-only backup (artifacts/versions/tags/config — never the artifact
  # files themselves, which already live durably in S3). Runs `fusion-index backup-db`
  # (same image as the backend) as a CronJob, streaming a `pg_dump --clean --if-exists`
  # straight into S3, gzipped. Only rendered when backend.storageBackend=S3 — reuses
  # the S3 bucket/credentials already required in that mode. No retention/pruning here
  # by design — configure an S3 lifecycle rule if/when you want old backups expired.
  # Restore is a deliberately manual operation — see CLAUDE.md "Helm — PostgreSQL
  # Backup" for the `fusion-index restore-db` runbook; it is NOT wired to any
  # automatic Helm trigger.
  backupCronJob:
    enabled: true
    schedule: "0 2 * * *"   # daily at 02:00
    activeDeadlineSeconds: 1800
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 1

# -----------------------------------------------------------------------------
# S3 artifact storage — external only
#
# credentialsType:
#   static  — provide accessKeyId + secretAccessKey (or existingSecret)
#   default — use IRSA / Workload Identity / instance profile (no secret needed)
# -----------------------------------------------------------------------------
s3:
  bucket: fusion-index-artifacts
  # Key prefix under the bucket. Namespaces every object under this path so multiple
  # fusion-index instances can share one bucket without colliding. Left empty (default),
  # it resolves to "<kubernetes-namespace>/index/data" (see fusion-index.s3Prefix in
  # _helpers.tpl) — every instance gets a collision-free default for free, with no
  # per-release configuration needed. Set explicitly (e.g. "index") to override.
  prefix: ""
  # Key prefix for daily DB metadata backups (see postgresql.backupCronJob below).
  # Independent of `prefix` above — not nested under it, since backups aren't
  # artifact data. Left empty (default), resolves to "<kubernetes-namespace>/index/backups".
  backupPrefix: ""
  region: us-east-1
  endpointOverride: ""     # set for MinIO, Ceph, or custom S3-compatible endpoints

  credentialsType: static

  # Provide an existing secret with keys: aws-access-key-id, aws-secret-access-key
  existingSecret: ""

  # Used only when existingSecret is empty and credentialsType is static
  # Do NOT commit real credentials here — inject via --set or a separate values file
  accessKeyId: ""
  secretAccessKey: ""

  # Runs as a pre-install,pre-upgrade hook Job (`fusion-index migrate-s3-prefix`,
  # same image as the backend) whenever storageBackend=S3. It compares s3.prefix
  # against the last-applied prefix recorded in a marker ConfigMap; if unchanged
  # (the common case on every ordinary upgrade) it's a fast no-op. If s3.prefix
  # changed, it server-side-copies every known object from the old prefix to the
  # new one — old objects are left in place, not deleted. Requires a namespaced
  # Role/RoleBinding (deployment/templates/s3-migration-rbac.yaml) scoped to that
  # one ConfigMap.
  migrationJob:
    enabled: true
    activeDeadlineSeconds: 600
    backoffLimit: 2

# -----------------------------------------------------------------------------
# Linkerd service mesh integration
#
# opaquePorts: comma-separated port list to mark as opaque TCP in Linkerd.
# Opaque ports bypass Linkerd's L7 HTTP/2 translation and use a raw mTLS TCP
# tunnel instead — required when Linkerd is installed and large multipart uploads
# (venv tar.gz from forge, GUI uploads via BFF) fail silently or with truncated
# body errors. Applied to both the Service and Pod annotations so the fix covers
# both fully-meshed (BFF→index) and half-meshed (builder Job→index) traffic.
# Set to "" (empty) when Linkerd is not installed.
# -----------------------------------------------------------------------------
linkerd:
  opaquePorts: ""   # e.g. "8080"

# -----------------------------------------------------------------------------
# Ingress
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  host: index.fusion.local
  # proxyBodySize: Nginx client_max_body_size for this Ingress.
  # Default Nginx value is 1m — set explicitly for large artifact uploads.
  # Set to "0" for unlimited. Rendered as nginx.ingress.kubernetes.io/proxy-body-size.
  proxyBodySize: "100m"
  annotations: {}
  tls:
    enabled: false
    secretName: fusion-index-tls
