{{- if .Values.postgresql.createDatabaseJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-create-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-index.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: {{ .Values.postgresql.createDatabaseJob.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "fusion-index.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- with .Values.postgresql.createDatabaseJob.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: create-db
          image: {{ .Values.postgresql.createDatabaseJob.image }}
          {{- with .Values.postgresql.createDatabaseJob.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: PGHOST
              value: {{ required "postgresql.host is required when postgresql.createDatabaseJob.enabled is true" .Values.postgresql.host | quote }}
            - name: PGPORT
              value: {{ .Values.postgresql.port | default 5432 | quote }}
            - name: PGUSER
              value: {{ .Values.postgresql.admin.username | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-index.pgAdminSecretName" . }}
                  key: {{ .Values.postgresql.admin.existingSecretKey | default "password" }}
            - name: TARGET_DB
              value: {{ .Values.postgresql.database | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # psql's :'var' substitution only works reading from a script/stdin,
              # NOT via -c "..." (verified against postgres:16-alpine) — so the
              # target name is interpolated directly instead. Safe here since it
              # comes from Helm values, not end-user input.
              EXISTS=$(psql -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '${TARGET_DB}'")
              if [ "${EXISTS}" = "1" ]; then
                echo "database ${TARGET_DB} already exists on ${PGHOST}:${PGPORT} — nothing to do"
              else
                psql -d postgres -c "CREATE DATABASE \"${TARGET_DB}\""
                echo "database ${TARGET_DB} created on ${PGHOST}:${PGPORT}"
              fi
{{- end }}
