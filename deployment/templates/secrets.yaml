{{/*
  DB secret — only created when using an external PostgreSQL without an existingSecret.
  When using the bundled Bitnami postgresql subchart, Bitnami manages its own secret.
*/}}
{{- if and (not .Values.postgresql.enabled) (not .Values.postgresql.external.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-index.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.postgresql.external.password | required "postgresql.external.password is required when postgresql.enabled=false and no existingSecret is set" | quote }}
---
{{- end }}
{{/*
  S3 secret — only created when storage backend is S3, credentialsType is static,
  and no existingSecret is provided.
*/}}
{{- if and (ne .Values.backend.storageBackend "FILESYSTEM") (eq .Values.s3.credentialsType "static") (not .Values.s3.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-s3-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-index.labels" . | nindent 4 }}
type: Opaque
stringData:
  aws-access-key-id:     {{ .Values.s3.accessKeyId | required "s3.accessKeyId is required when credentialsType=static and no existingSecret is set" | quote }}
  aws-secret-access-key: {{ .Values.s3.secretAccessKey | required "s3.secretAccessKey is required when credentialsType=static and no existingSecret is set" | quote }}
{{- end }}
