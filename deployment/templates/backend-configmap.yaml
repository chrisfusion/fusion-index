apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-backend-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-index.labels" . | nindent 4 }}
    app: {{ include "fusion-index.backendServiceName" . }}
data:
  DB_HOST:              {{ include "fusion-index.dbHost" . | quote }}
  DB_PORT:              {{ include "fusion-index.dbPort" . | quote }}
  DB_NAME:              {{ include "fusion-index.dbName" . | quote }}
  DB_USERNAME:          {{ include "fusion-index.dbUsername" . | quote }}
  DB_SSLMODE:           {{ .Values.backend.dbSSLMode | default "disable" | quote }}
  STORAGE_BACKEND:      {{ .Values.backend.storageBackend | default "S3" | quote }}
  {{- if ne .Values.backend.storageBackend "FILESYSTEM" }}
  S3_BUCKET:            {{ .Values.s3.bucket | quote }}
  AWS_REGION:           {{ .Values.s3.region | quote }}
  S3_ENDPOINT_OVERRIDE: {{ .Values.s3.endpointOverride | default "" | quote }}
  {{- end }}
  GIN_MODE:             {{ .Values.backend.ginMode | default "release" | quote }}
  AUTH_ENABLED:         {{ .Values.auth.enabled | toString | quote }}
  AUTH_AUDIENCE:        {{ .Values.auth.audience | default "" | quote }}
  AUTH_ALLOWED_SA:      {{ .Values.auth.allowedServiceAccounts | join "," | quote }}
