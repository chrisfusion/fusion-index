{{- if and (eq .Values.backend.storageBackend "FILESYSTEM") .Values.backend.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "fusion-index.backendServiceName" . }}-artifacts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-index.labels" . | nindent 4 }}
    app: {{ include "fusion-index.backendServiceName" . }}
spec:
  accessModes:
    - {{ .Values.backend.persistence.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.backend.persistence.size }}
  {{- if .Values.backend.persistence.storageClass }}
  storageClassName: {{ .Values.backend.persistence.storageClass }}
  {{- end }}
{{- end }}
