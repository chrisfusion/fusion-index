{{- if and (eq .Values.backend.storageBackend "S3") .Values.s3.migrationJob.enabled }}
{{/*
  Must exist before the s3-prefix-migration Job (hook-weight "-3") runs — same
  ordering gotcha as postgresql-admin-secret.yaml (see that file's comment).

  This duplicates db-secret/s3-secret's content rather than turning those into
  hooks: hook resources annotated only with before-hook-creation are NOT deleted by
  `helm uninstall` (verified against this cluster's Helm) — only replaced right
  before the *next* release's hook phase. Converting the app's own runtime
  credential Secrets into hooks would leak them after every uninstall, so this
  narrowly-scoped, migration-only secret accepts that trade-off instead (same as
  postgresql-admin-secret.yaml already does for the DB admin password).

  Only populated for values the migration Job needs a chart-managed secret for —
  when postgresql.existingSecret / s3.existingSecret is set, the Job references
  that secret directly instead (see s3-prefix-migration-job.yaml), since it already
  exists independent of this release's hook ordering.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fusion-index.s3MigrationSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-index.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-4"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
stringData:
  {{- if not .Values.postgresql.existingSecret }}
  db-password: {{ .Values.postgresql.password | required "postgresql.password is required when no existingSecret is set" | quote }}
  {{- end }}
  {{- if and (ne .Values.s3.credentialsType "default") (not .Values.s3.existingSecret) }}
  aws-access-key-id:     {{ .Values.s3.accessKeyId | required "s3.accessKeyId is required when credentialsType=static and no existingSecret is set" | quote }}
  aws-secret-access-key: {{ .Values.s3.secretAccessKey | required "s3.secretAccessKey is required when credentialsType=static and no existingSecret is set" | quote }}
  {{- end }}
{{- end }}
