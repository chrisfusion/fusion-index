{{- if and .Values.postgresql.createDatabaseJob.enabled (not .Values.postgresql.admin.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fusion-index.pgAdminSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-index.labels" . | nindent 4 }}
  annotations:
    # Must exist before the create-db Job (hook-weight "-5") runs, since that Job
    # reads this password via secretKeyRef. Ordinary (non-hook) resources are only
    # applied *after* pre-install/pre-upgrade hooks, so without this the Job's pod
    # sits in CreateContainerConfigError until activeDeadlineSeconds kills it.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-6"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
stringData:
  password: {{ .Values.postgresql.admin.password | required "postgresql.admin.password (or postgresql.admin.existingSecret) is required when postgresql.createDatabaseJob.enabled is true" | quote }}
{{- end }}
