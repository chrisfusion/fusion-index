apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fusion-index.backendServiceName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-index.labels" . | nindent 4 }}
    app: {{ include "fusion-index.backendServiceName" . }}
    component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ include "fusion-index.backendServiceName" . }}
  template:
    metadata:
      labels:
        app: {{ include "fusion-index.backendServiceName" . }}
        {{- include "fusion-index.labels" . | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-backend-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-index.dbSecretName" . }}
                  key: password
            {{- if and (ne .Values.backend.storageBackend "FILESYSTEM") (ne .Values.s3.credentialsType "default") }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-index.s3SecretName" . }}
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-index.s3SecretName" . }}
                  key: aws-secret-access-key
            {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
