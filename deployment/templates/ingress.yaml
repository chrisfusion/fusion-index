{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-index.labels" . | nindent 4 }}
  {{- $ingressAnno := merge (dict) (.Values.ingress.annotations | default dict) }}
  {{- if .Values.ingress.proxyBodySize }}
  {{- $_ := set $ingressAnno "nginx.ingress.kubernetes.io/proxy-body-size" .Values.ingress.proxyBodySize }}
  {{- end }}
  {{- with $ingressAnno }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Backend REST API — /api/* proxied to Quarkus
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "fusion-index.backendServiceName" . }}
                port:
                  name: http
          # Quarkus health + OpenAPI endpoints
          - path: /q
            pathType: Prefix
            backend:
              service:
                name: {{ include "fusion-index.backendServiceName" . }}
                port:
                  name: http

{{- end }}
