apiVersion: v1
kind: Service
metadata:
  name: {{ include "fusion-index.backendServiceName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-index.labels" . | nindent 4 }}
    app: {{ include "fusion-index.backendServiceName" . }}
    component: backend
spec:
  type: ClusterIP
  selector:
    app: {{ include "fusion-index.backendServiceName" . }}
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
