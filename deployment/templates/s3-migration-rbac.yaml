{{- if and (eq .Values.backend.storageBackend "S3") .Values.s3.migrationJob.enabled }}
{{/*
  Must exist before the s3-prefix-migration Job (hook-weight "-3") runs, since that
  Job authenticates as this ServiceAccount. Ordinary (non-hook) resources are only
  applied *after* pre-install/pre-upgrade hooks, so without hook annotations here the
  Job fails immediately with "serviceaccount ... not found" — same class of gotcha as
  postgresql-admin-secret.yaml (weight "-6") vs the create-db Job (weight "-5").
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fusion-index.s3MigrationServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-index.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-4"
    helm.sh/hook-delete-policy: before-hook-creation
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "fusion-index.s3MigrationServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-index.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-4"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  # "create" cannot be scoped by resourceNames (the object doesn't exist yet at
  # authorization time) — get/update below are scoped to the one marker ConfigMap.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: [{{ include "fusion-index.s3MigrationConfigMapName" . | quote }}]
    verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "fusion-index.s3MigrationServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-index.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-4"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "fusion-index.s3MigrationServiceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "fusion-index.s3MigrationServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
