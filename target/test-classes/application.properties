# Test profile — H2 in-memory
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:fusion_index_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.flyway.migrate-at-start=false

# Artifact storage — use temp filesystem in tests
fusion.index.storage.backend=FILESYSTEM
fusion.index.storage.filesystem.root=/tmp/fusion-index-test-artifacts
