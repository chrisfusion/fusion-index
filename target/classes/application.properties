# Application
quarkus.application.name=fusion-index
quarkus.http.port=8080

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:fusion}
quarkus.datasource.password=${DB_PASSWORD:fusion}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fusion_index}

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# CORS — allow Module Federation host (fusion-spectra) to call this API
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# Artifact storage
fusion.index.storage.backend=${STORAGE_BACKEND:FILESYSTEM}
fusion.index.storage.filesystem.root=${STORAGE_FS_ROOT:${user.home}/.fusion-index/artifacts}
fusion.index.storage.s3.bucket=${S3_BUCKET:fusion-index-artifacts}

# S3 (active when backend=S3)
quarkus.s3.aws.region=${AWS_REGION:us-east-1}
quarkus.s3.aws.credentials.type=default
quarkus.s3.endpoint-override=${S3_ENDPOINT_OVERRIDE:}
